<div class="add-entity-container">
  <form #entityForm="ngForm" (ngSubmit)="onSave()" novalidate>
    <div class="entity-form">
      <mat-form-field
        appearance="fill"
        class="full-width"
        [class.has-error]="nameError || (entityNameModel?.invalid && (entityNameModel?.touched || submitted))"
        [class.has-error-message]="nameError || (entityNameModel?.invalid && (entityNameModel?.touched || submitted))">
        <mat-label>Name</mat-label>
        <input
          matInput
          name="entityName"
          [(ngModel)]="entityName"
          (ngModelChange)="onEntityNameChange()"
          #entityNameInput
          #entityNameModel="ngModel"
          placeholder="Entity name"
          required>
        <mat-error *ngIf="nameError || (entityNameModel?.invalid && (entityNameModel?.touched || submitted))">
          {{ nameError || 'Entity name is required.' }}
        </mat-error>
      </mat-form-field>

      <div class="form-group checkbox-group">
        <mat-checkbox
          name="mappedSuperclass"
          [(ngModel)]="mappedSuperclass"
          (change)="onMappedSuperclassChange()"
          color="primary">
          Mapped superclass
        </mat-checkbox>
        <button class="help-btn" type="button" aria-label="Help">
          <i class="bi bi-question-circle"></i>
        </button>
      </div>

      <div class="section-divider"></div>

      <div class="crud-section" *ngIf="!mappedSuperclass">
        <h3 class="section-title">CRUD Options</h3>
        <div class="form-group checkbox-group">
          <mat-checkbox
            name="addRestEndpoints"
            [(ngModel)]="addRestEndpoints"
            [disabled]="mappedSuperclass"
            color="primary">
            Add REST endpoints
          </mat-checkbox>
          <button class="help-btn" type="button" aria-label="Help">
            <i class="bi bi-question-circle"></i>
          </button>
        </div>

        <div class="section-divider"></div>
      </div>

      <div class="fields-section">
        <div class="fields-header">
          <h3 class="section-title">Fields</h3>
          <button class="add-field-btn" type="button" (click)="addField()" aria-label="Add field">
            <mat-icon>add_circle</mat-icon>
          </button>
        </div>

        <mat-accordion class="fields-list" multi>
          <mat-expansion-panel *ngFor="let field of fields; let i = index" [expanded]="i === 0">
            <mat-expansion-panel-header>
              <mat-panel-title>{{ field.name || ('New field ' + (i + 1)) }}</mat-panel-title>
              <mat-panel-description>{{ field.type }}</mat-panel-description>
            </mat-expansion-panel-header>
            <app-field-item
              [field]="field"
              [index]="i"
              [totalFields]="fields.length"
              [fieldTypes]="fieldTypes"
              [canDelete]="i > 0"
              [canMoveUp]="i > 1"
              [canMoveDown]="i > 0 && i < fields.length - 1"
              [primaryLocked]="primarySelected && !field.primaryKey"
              [submitted]="submitted"
              (fieldChange)="onFieldChange($event)"
              (fieldNameChange)="onFieldNameChange($event)"
              (fieldTypeChange)="onFieldTypeChange($event)"
              (primaryChange)="onPrimaryChange($event)"
              (deleteField)="removeField(i)"
              (moveUp)="moveFieldUp(i)"
              (moveDown)="moveFieldDown(i)">
            </app-field-item>
          </mat-expansion-panel>
        </mat-accordion>
      </div>
    </div>
  </form>
</div>
