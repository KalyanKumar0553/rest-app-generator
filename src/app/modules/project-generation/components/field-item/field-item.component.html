<div class="field-item">
  <mat-form-field appearance="fill" class="field-type-select">
    <mat-label>Field Type</mat-label>
    <mat-select
      [name]="'fieldType' + index"
      [(ngModel)]="field.type"
      (selectionChange)="onTypeChange()">
      <mat-option *ngFor="let type of fieldTypes" [value]="type">{{ type }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill" class="field-name-input" [class.has-error]="field.nameError || (fieldNameModel?.invalid && (fieldNameModel?.touched || submitted))">
    <mat-label>Field name</mat-label>
    <input
      matInput
      [name]="'fieldName' + index"
      [(ngModel)]="field.name"
      (ngModelChange)="onNameChange()"
      #fieldNameInput
      #fieldNameModel="ngModel"
      placeholder="Field name"
      required>
    <mat-error *ngIf="field.nameError || (fieldNameModel?.invalid && (fieldNameModel?.touched || submitted))">
      {{ field.nameError || 'Field name is required.' }}
    </mat-error>
  </mat-form-field>

  <mat-form-field appearance="fill" class="field-max-length-input" *ngIf="field.type === 'String'">
    <mat-label>Max length</mat-label>
    <input
      matInput
      type="number"
      [name]="'maxLength' + index"
      [(ngModel)]="field.maxLength"
      (ngModelChange)="onFieldUpdate()"
      placeholder="255">
  </mat-form-field>

  <div class="field-constraints">
    <mat-checkbox
      [(ngModel)]="field.primaryKey"
      [name]="'primaryKey' + index"
      [disabled]="primaryLocked && !field.primaryKey"
      (change)="onPrimaryChange()"
      color="primary"
      class="constraint-checkbox">
      Primary key
    </mat-checkbox>

    <mat-checkbox
      *ngIf="!field.primaryKey"
      [(ngModel)]="field.required"
      [name]="'required' + index"
      (change)="onFieldUpdate()"
      color="primary"
      class="constraint-checkbox">
      Required
    </mat-checkbox>

    <mat-checkbox
      *ngIf="!field.primaryKey"
      [(ngModel)]="field.unique"
      [name]="'unique' + index"
      (change)="onFieldUpdate()"
      color="primary"
      class="constraint-checkbox">
      Unique
    </mat-checkbox>
  </div>

  <div class="field-actions">
    <button
      mat-icon-button
      class="action-btn delete-btn"
      type="button"
      *ngIf="canDelete"
      (click)="onDelete()"
      aria-label="Delete field">
      <mat-icon>delete</mat-icon>
    </button>
    <div class="reorder-controls" *ngIf="canDelete">
      <button
        mat-icon-button
        class="action-btn reorder-btn"
        type="button"
        [disabled]="!canMoveUp"
        (click)="onMoveUp()"
        aria-label="Move field up">
        <mat-icon>keyboard_arrow_up</mat-icon>
      </button>
      <button
        mat-icon-button
        class="action-btn reorder-btn"
        type="button"
        [disabled]="!canMoveDown"
        (click)="onMoveDown()"
        aria-label="Move field down">
        <mat-icon>keyboard_arrow_down</mat-icon>
      </button>
    </div>
  </div>
</div>
