<section class="modules-panel">
  <div class="modules-copy">
    <div class="modules-title-row">
      <h2>Select Modules</h2>
      <button
        type="button"
        class="modules-help-btn"
        [matTooltip]="modulesHelpText"
        aria-label="Modules help">
        <mat-icon>help_outline</mat-icon>
      </button>
    </div>
  </div>

  <app-search-sort
    [searchConfig]="searchConfig"
    [sortOptions]="sortOptions"
    (searchSortChange)="onSearchSortChange($event)">
  </app-search-sort>

  <div class="modules-grid">
    <article class="module-card" *ngFor="let module of filteredModules">
      <div class="module-card-header">
        <h3>{{ module.title }}</h3>
        <mat-checkbox
          [checked]="isSelected(module.key)"
          (change)="toggleModule(module.key, $event.checked)">
        </mat-checkbox>
      </div>
      <p class="module-card-description">{{ module.description }}</p>
    </article>
  </div>

  <div class="modules-grid" *ngIf="filteredPluginModules.length > 0">
    <article class="module-card" *ngFor="let plugin of filteredPluginModules">
      <div class="module-card-header">
        <div class="plugin-title-group">
          <h3>{{ plugin.name }}</h3>
          <span class="module-key">{{ plugin.code }}</span>
        </div>
        <mat-checkbox
          [checked]="isPluginSelected(plugin.id)"
          (change)="togglePlugin(plugin, $event.checked)">
        </mat-checkbox>
      </div>
      <p class="module-card-description">{{ plugin.description || 'Reusable plugin module uploaded by an administrator.' }}</p>
      <div class="plugin-meta-row">
        <span class="module-key" *ngIf="plugin.category">{{ plugin.category }}</span>
        <div class="plugin-version-control">
          <label class="plugin-version-label" [attr.for]="'plugin-version-' + plugin.id">Version</label>
          <select
            class="plugin-version-select"
            [id]="'plugin-version-' + plugin.id"
            [ngModel]="getPluginSelectedVersionId(plugin)"
            (ngModelChange)="onPluginVersionChange(plugin, $event)"
            [disabled]="!isPluginSelected(plugin.id)">
            <option *ngFor="let version of plugin.versions" [ngValue]="version.id">{{ version.versionCode }}</option>
          </select>
        </div>
      </div>
    </article>
  </div>

  <div class="modules-empty" *ngIf="filteredModules.length === 0 && filteredPluginModules.length === 0">
    <p>No modules match the current filter.</p>
  </div>
</section>
