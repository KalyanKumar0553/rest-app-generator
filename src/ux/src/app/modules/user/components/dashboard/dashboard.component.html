<app-confirmation-modal
  *ngIf="showLogoutConfirmation"
  [title]="logoutModalConfig.title"
  [message]="logoutModalConfig.message"
  [buttons]="logoutModalConfig.buttons"
  [isLoading]="isLoggingOut"
  (confirm)="confirmLogout()"
  (cancel)="cancelLogout()"
></app-confirmation-modal>

<div class="dashboard-container">
  <div class="mobile-header">
    <div class="container">
      <div class="header-content">
        <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
          <i class="bi bi-list"></i>
        </button>
        <div class="logo">
          <span class="logo-icon">&lt;/&gt;</span>
          <span class="logo-text">{{ appSettings.appName }}</span>
        </div>
        <div class="spacer"></div>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebar()"></div>

  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">&lt;/&gt;</span>
        <span class="logo-text">{{ appSettings.appName }}</span>
      </div>
      <div class="user-info">
        <p class="welcome">Welcome,</p>
        <p class="email">{{ userEmail }}</p>
      </div>
    </div>

    <app-sidenav
      [navItems]="navItems"
      [activeItem]="activeSection"
      (itemClick)="navigateToSection($event)">
    </app-sidenav>

    <nav class="sidebar-nav sidebar-nav-footer">
      <button class="nav-item" (click)="logout(); closeSidebar()">
        <mat-icon class="nav-icon">logout</mat-icon>
        <span class="nav-label">Logout</span>
      </button>
    </nav>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
