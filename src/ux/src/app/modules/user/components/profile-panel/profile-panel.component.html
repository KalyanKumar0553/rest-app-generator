<section class="dashboard-panel">
  <div class="content-header">
    <div class="section-intro">
      <div class="section-title-row">
        <h1 class="section-title">Profile</h1>
        <button
          type="button"
          class="section-help-btn"
          [matTooltip]="profileHelpText"
          aria-label="Profile help">
          <mat-icon>help_outline</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="content-body">
    <section class="panel-card">
      <div class="panel-header">
        <div class="panel-title-row">
          <h2>Access Profile</h2>
          <button
            type="button"
            class="section-help-btn"
            [matTooltip]="accessProfileHelpText"
            aria-label="Access profile help">
            <mat-icon>help_outline</mat-icon>
          </button>
        </div>
      </div>
      <div class="stack-form access-profile-form">
        <div class="form-row">
          <label class="form-label" for="profileName">Name</label>
          <div class="field-group">
            <input id="profileName" type="text" class="text-input" [value]="userName" readonly />
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="profileEmail">Email</label>
          <div class="field-group">
            <input id="profileEmail" type="email" class="text-input" [value]="userEmail" readonly />
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="profileRoles">Roles</label>
          <div class="field-group">
            <textarea
              id="profileRoles"
              class="text-input text-textarea"
              [value]="userRoles.length ? userRoles.join(', ') : 'No roles found'"
              rows="2"
              readonly></textarea>
          </div>
        </div>

        <div class="form-row">
          <label class="form-label" for="profilePermissions">Permissions</label>
          <div class="field-group">
            <textarea
              id="profilePermissions"
              class="text-input text-textarea"
              [value]="userPermissions.length ? userPermissions.join(', ') : 'No permissions found'"
              rows="4"
              readonly></textarea>
          </div>
        </div>
      </div>
    </section>

    <div class="section-divider" role="presentation"></div>

    <section class="profile-sections">
      <article class="panel-card form-panel">
        <div class="panel-header">
          <div class="panel-title-row">
            <h2>Change password</h2>
            <button
              type="button"
              class="section-help-btn"
              [matTooltip]="changePasswordHelpText"
              aria-label="Change password help">
              <mat-icon>help_outline</mat-icon>
            </button>
          </div>
        </div>

        <form [formGroup]="passwordForm" class="stack-form" (ngSubmit)="updatePassword()">
          <div class="form-row">
            <label class="form-label" for="currentPassword">Current password</label>
            <div class="field-group">
              <input id="currentPassword" type="password" class="text-input" formControlName="currentPassword" placeholder="Enter your current password" />
              <span class="field-error" *ngIf="getPasswordError('currentPassword')">{{ getPasswordError('currentPassword') }}</span>
            </div>
          </div>

          <div class="form-row">
            <label class="form-label" for="newPassword">New password</label>
            <div class="field-group">
              <input id="newPassword" type="password" class="text-input" formControlName="newPassword" placeholder="Choose a new password" />
              <span class="field-hint">Use at least 8 characters.</span>
              <span class="field-error" *ngIf="getPasswordError('newPassword')">{{ getPasswordError('newPassword') }}</span>
            </div>
          </div>

          <div class="form-row">
            <label class="form-label" for="confirmPassword">Retype password</label>
            <div class="field-group">
              <input id="confirmPassword" type="password" class="text-input" formControlName="confirmPassword" placeholder="Retype the new password" />
              <span class="field-error" *ngIf="getPasswordError('confirmPassword')">{{ getPasswordError('confirmPassword') }}</span>
            </div>
          </div>

          <div class="panel-actions">
            <button type="submit" class="btn btn-primary" [disabled]="isSavingPassword">
              {{ isSavingPassword ? 'Updating...' : 'Update password' }}
            </button>
          </div>
        </form>
      </article>

      <article class="panel-card form-panel">
        <div class="panel-header">
          <div class="panel-title-row">
            <h2>Change timezone</h2>
            <button
              type="button"
              class="section-help-btn"
              [matTooltip]="changeTimezoneHelpText"
              aria-label="Change timezone help">
              <mat-icon>help_outline</mat-icon>
            </button>
          </div>
        </div>

        <form [formGroup]="timezoneForm" class="stack-form" (ngSubmit)="updateTimeZone()">
          <div class="form-row">
            <label class="form-label" for="countryCode">Country</label>
            <div class="field-group">
              <select id="countryCode" class="text-select" formControlName="countryCode">
                <option value="" disabled>Select a country</option>
                <option *ngFor="let country of availableCountries" [value]="country.code">{{ country.country }}</option>
              </select>
              <span class="field-error" *ngIf="getTimeZoneError('countryCode')">{{ getTimeZoneError('countryCode') }}</span>
            </div>
          </div>

          <div class="form-row">
            <label class="form-label" for="timeZoneId">City</label>
            <div class="field-group">
              <select id="timeZoneId" class="text-select" formControlName="timeZoneId">
                <option value="" disabled>Select a timezone city</option>
                <option *ngFor="let timeZoneId of availableTimeZones" [value]="timeZoneId">{{ getTimeZoneLabel(timeZoneId) }}</option>
              </select>
              <span class="field-error" *ngIf="getTimeZoneError('timeZoneId')">{{ getTimeZoneError('timeZoneId') }}</span>
            </div>
          </div>

          <div class="panel-actions">
            <button type="submit" class="btn btn-secondary" [disabled]="isSavingTimeZone">
              {{ isSavingTimeZone ? 'Updating...' : 'Update timezone' }}
            </button>
          </div>
        </form>
      </article>
    </section>
  </div>
</section>
