<div class="checkout-page">
  <div class="checkout-card">
    <!-- Header -->
    <div class="checkout-card__header">
      <div class="checkout-card__icon">
        <i class="bi bi-shield-lock-fill"></i>
      </div>
      <h1 class="checkout-card__title">Verify OTP</h1>
      <p class="checkout-card__subtitle">
        We've sent a 6-digit code to
        <strong class="masked-mobile">{{ maskedMobile }}</strong>
      </p>
    </div>

    <!-- Body -->
    <div class="checkout-card__body">
      <!-- Step indicator -->
      <div class="step-indicator">
        <div class="step step--done">
          <span class="step__dot"><i class="bi bi-check-lg"></i></span>
          <span class="step__label">Mobile</span>
        </div>
        <div class="step-connector step-connector--done"></div>
        <div class="step step--active">
          <span class="step__dot"><i class="bi bi-shield-lock-fill"></i></span>
          <span class="step__label">Verify OTP</span>
        </div>
        <div class="step-connector"></div>
        <div class="step">
          <span class="step__dot">3</span>
          <span class="step__label">Payment</span>
        </div>
      </div>

      <form (ngSubmit)="verifyOtp()" novalidate>
        <!-- OTP input -->
        <div class="form-group">
          <label class="form-label" for="otp">Enter 6-digit OTP</label>
          <input
            id="otp"
            name="otp"
            type="text"
            inputmode="numeric"
            maxlength="6"
            class="form-control otp-input"
            [class.form-control--error]="otpError"
            [(ngModel)]="otpValue"
            (input)="onOtpInput()"
            placeholder="——————"
            autocomplete="one-time-code"
            [disabled]="isLoading"
          />
          <span class="error-message" *ngIf="otpError">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ otpError }}
          </span>
        </div>

        <!-- Countdown / Resend section -->
        <div class="resend-section">
          <ng-container *ngIf="!canResend">
            <p class="timer-text">
              <i class="bi bi-clock"></i>
              Resend available in <strong>{{ formattedTime }}</strong>
            </p>
          </ng-container>

          <ng-container *ngIf="canResend">
            <!-- Turnstile for resend -->
            <div class="resend-turnstile" *ngIf="showResendTurnstile">
              <p class="resend-turnstile-label">
                <i class="bi bi-shield-lock"></i>
                Complete the security check to resend OTP
              </p>
              <div class="turnstile-section">
                <app-turnstile
                  theme="auto"
                  size="flexible"
                  (tokenChange)="onResendTurnstileToken($event)"
                  (expired)="onResendTurnstileExpired()"
                ></app-turnstile>
              </div>
              <button
                type="button"
                class="btn-resend-confirm"
                [disabled]="!resendTurnstileToken || isLoading"
                (click)="confirmResend()"
              >
                <i class="bi bi-arrow-repeat"></i>
                Resend OTP
              </button>
            </div>

            <!-- Trigger button before Turnstile shown -->
            <p class="resend-prompt" *ngIf="!showResendTurnstile">
              Didn't receive the code?
              <button
                type="button"
                class="link-btn"
                (click)="requestResend()"
                [disabled]="isLoading"
              >
                Resend OTP
              </button>
            </p>
          </ng-container>
        </div>

        <!-- Actions -->
        <div class="action-row">
          <button type="button" class="btn-secondary" (click)="goBack()" [disabled]="isLoading">
            <i class="bi bi-arrow-left"></i> Back
          </button>
          <button type="submit" class="btn-primary" [disabled]="isVerifyDisabled">
            <span *ngIf="!isLoading">
              <i class="bi bi-check2-circle"></i> Verify OTP
            </span>
            <span *ngIf="isLoading" class="loading-label">
              <i class="bi bi-arrow-repeat spinner-icon"></i> Verifying…
            </span>
          </button>
        </div>
      </form>
    </div>

    <div class="checkout-card__footer">
      <i class="bi bi-lock-fill"></i>
      Your OTP is valid for 10 minutes. Do not share it with anyone.
    </div>
  </div>
</div>
