<app-modal
  [isOpen]="showAddContributorModal"
  title="Add contributors"
  size="medium"
  (close)="closeAddContributorModal()">
  <app-searchable-select
    label="Search users"
    placeholder="Search by name or email"
    [searchResults]="contributorSearchResults"
    [isSearching]="isContributorSearching"
    [selectedItems]="selectedContributorItems"
    [excludeIds]="existingContributorIds"
    emptyMessage="No users found."
    (searchChange)="onContributorSearch($event)"
    (selectedItemsChange)="selectedContributorItems = $event">
  </app-searchable-select>
  <div modal-footer class="project-modal-footer">
    <button mat-stroked-button type="button" (click)="closeAddContributorModal()">Cancel</button>
    <button mat-raised-button color="primary" type="button" (click)="submitAddContributors()" [disabled]="isAddingContributors || selectedContributorItems.length === 0">
      <span *ngIf="!isAddingContributors">Submit</span>
      <span *ngIf="isAddingContributors">Adding...</span>
    </button>
  </div>
</app-modal>

<div class="mobile-header">
  <div class="container">
    <div class="header-content">
      <div class="logo" (click)="handleHome()">
        <span class="logo-icon">&lt;/&gt;</span>
        <span class="logo-text">{{ appSettings.appName }}</span>
      </div>
      <div class="spacer"></div>
      <button class="menu-toggle" (click)="toggleSidebar()" aria-label="Toggle menu">
        <i class="bi bi-list"></i>
      </button>
    </div>
  </div>
</div>

<div class="sidebar-overlay" [class.show]="isSidebarOpen" (click)="closeSidebar()"></div>

<div class="project-dashboard-container">
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <div class="logo" (click)="handleHome()">
        <span class="logo-icon">&lt;/&gt;</span>
        <span class="logo-text">{{ appSettings.appName }}</span>
      </div>
    </div>

    <app-sidenav
      [navItems]="visibleNavItems"
      [activeItem]="activeSection"
      (itemClick)="navigateToSection($event)">
    </app-sidenav>
  </aside>

  <main class="main-content">
    <app-project-generation-general-section *ngIf="activeSection === 'general'" [host]="this"></app-project-generation-general-section>

    <app-project-generation-actuator-section *ngIf="activeSection === 'actuator' && developerPreferences.enableActuator" [host]="this"></app-project-generation-actuator-section>

    <app-project-generation-entities-section *ngIf="activeSection === 'entities'" [host]="this"></app-project-generation-entities-section>

    <app-project-generation-data-objects-section *ngIf="activeSection === 'data-objects'" [host]="this"></app-project-generation-data-objects-section>

    <app-project-generation-mappers-section *ngIf="activeSection === 'mappers'" [host]="this"></app-project-generation-mappers-section>

    <app-project-generation-controllers-section *ngIf="activeSection === 'controllers' && developerPreferences.configureApi" [host]="this"></app-project-generation-controllers-section>

    <app-project-generation-modules-section *ngIf="activeSection === 'modules'" [host]="this"></app-project-generation-modules-section>

    <app-project-generation-module-tab-section *ngIf="isModuleSectionActive('rbac')" [host]="this" moduleKey="rbac"></app-project-generation-module-tab-section>
    
    <app-project-generation-module-tab-section *ngIf="isModuleSectionActive('auth')" [host]="this" moduleKey="auth"></app-project-generation-module-tab-section>
    
    <app-project-generation-module-tab-section *ngIf="isModuleSectionActive('state-machine')" [host]="this" moduleKey="state-machine"></app-project-generation-module-tab-section>
    
    <app-project-generation-module-tab-section *ngIf="isModuleSectionActive('subscription')" [host]="this" moduleKey="subscription"></app-project-generation-module-tab-section>

    <app-project-generation-module-tab-section *ngIf="isModuleSectionActive('swagger')" [host]="this" moduleKey="swagger"></app-project-generation-module-tab-section>

    <app-project-generation-module-tab-section *ngIf="isModuleSectionActive('cdn')" [host]="this" moduleKey="cdn"></app-project-generation-module-tab-section>
    
    <app-project-generation-collaborate-section *ngIf="activeSection === 'collaborate'" [host]="this"></app-project-generation-collaborate-section>
    
    <app-project-generation-explore-section *ngIf="activeSection === 'explore'" [host]="this"></app-project-generation-explore-section>
  </main>
</div>

<app-modal
  [isOpen]="showProfileModal"
  [title]="'Add Profiles'"
  [size]="'medium'"
  [showFooter]="false"
  (close)="closeProfileModal()">
  <app-add-profile
    [isOpen]="showProfileModal"
    [profiles]="developerPreferences.profiles"
    (save)="onProfilesSave($event)"
    (cancel)="closeProfileModal()">
  </app-add-profile>
</app-modal>

<app-modal
  [isOpen]="showYamlPreviewModal"
  [title]="'YAML Preview'"
  [size]="'large'"
  [showFooter]="false"
  (close)="closeYamlPreviewModal()">
  <app-project-spec [spec]="yamlPreviewContent"></app-project-spec>
</app-modal>

<app-modal
  [isOpen]="showContributorPermissionsModal"
  [title]="'Edit permissions'"
  [size]="'medium'"
  [showFooter]="true"
  (close)="closeContributorPermissionsModal()">
  <div class="mobile-contributor-permissions-modal" *ngIf="selectedContributorForMobileEdit">
    <p class="mobile-contributor-permissions-user">{{ selectedContributorForMobileEdit.userId }}</p>
    <div class="mobile-contributor-permissions-options">
      <mat-checkbox [(ngModel)]="selectedContributorForMobileEdit.canEditDraft">Edit spec</mat-checkbox>
      <mat-checkbox [(ngModel)]="selectedContributorForMobileEdit.canGenerate">Generate</mat-checkbox>
      <mat-checkbox [(ngModel)]="selectedContributorForMobileEdit.canManageCollaboration">Manage collaboration</mat-checkbox>
    </div>
  </div>
  <div modal-footer>
    <button mat-stroked-button type="button" (click)="closeContributorPermissionsModal()">Cancel</button>
    <button mat-raised-button type="button" (click)="saveContributorPermissionsFromModal()" [disabled]="!canManageContributors()">
      Save
    </button>
  </div>
</app-modal>
