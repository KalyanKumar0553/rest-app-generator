oauth.google.scope=${OAUTH_GOOGLE_SCOPE:openid,profile,email}
app.auth.keycloak.enabled=${APP_AUTH_KEYCLOAK_ENABLED:false}
app.oauth2.success-redirect-uri=${OAUTH_SUCCESS_REDIRECT_URI:http://localhost:8080/#/auth/oauth/callback}
app.oauth2.failure-redirect-uri=${OAUTH_FAILURE_REDIRECT_URI:http://localhost:8080/#/auth/oauth/callback}
tenant.header.name=x-tenant-code
